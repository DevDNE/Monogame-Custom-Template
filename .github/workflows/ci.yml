name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore src/MonoGame.GameFramework.Tests/MonoGame.GameFramework.Tests.csproj
      - name: Build
        run: dotnet build src/MonoGame.GameFramework.Tests/MonoGame.GameFramework.Tests.csproj --no-restore --configuration Release
      - name: Test
        run: dotnet test src/MonoGame.GameFramework.Tests/MonoGame.GameFramework.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
